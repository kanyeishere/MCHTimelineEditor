<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FF14 机工士 PVE 时间轴模拟器</title><link rel="stylesheet" href="styles.css"></head><body><header><h1>FF14 机工士 PVE 技能时间轴模拟器</h1><p>参考机工士 PVE 量谱与技能：热量、电量、战技/能力技、冷却和充能；用于排轴草稿。</p></header><section class="resources"><div>🔥 热量 <b id="heatNow">0</b><meter id="heatMeter" min="0" max="100" value="0"></meter></div><div>🔋 电量 <b id="batNow">0</b><meter id="batMeter" min="0" max="100" value="0"></meter></div><div>双将层数 <b id="doubleNow">3</b></div><div>将死层数 <b id="checkNow">3</b></div><button id="reset">↻ 重置</button></section><section id="palette" class="palette"></section><div id="toast" class="toast">拖动技能到时间轴：大格放GCD，小格放能力技。</div><main class="timeline"><aside><b>Timeline</b><span>Resources</span><span>GCD</span><span>能力技 1</span><span>能力技 2</span><span>能力技 3</span></aside><div id="grid" class="grid"></div></main><footer>提示：横向每列代表一个 GCD 窗口（2.5s 刻度）；烈焰弹标记为 1.5s 短 GCD。技能若仍在CD或资源不足，将无法拖入该位置。</footer><script src="app.js"></script></body></html>
