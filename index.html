<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FF14 机工士 PVE 时间轴模拟器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Machinist Timeline Editor</p>
        <h1>FF14 机工士 PVE 技能时间轴模拟器</h1>
      </div>
      <div class="hero-actions">
        <button id="exportPlan" type="button">⇩ 导出</button>
        <label class="import-button" for="importPlan">⇧ 导入</label>
        <input id="importPlan" type="file" accept="application/json,.json">
        <button id="reset" type="button">↻ 重置</button>
      </div>
    </header>

    <section class="skill-panel" aria-label="可拖拽技能图标">
      <div class="panel-heading">
        <h2>PvE技能</h2>
        <div class="quick-adds">
          <button id="addBasicCombo" type="button">+ 基础连</button>
          <button id="addOverheatCombo" type="button">+ 过热连</button>
        </div>
      </div>
      <div id="palette" class="palette"></div>
    </section>

    <div id="toast" class="toast">拖动技能到时间轴：大格放GCD战技，小格放能力技。</div>

    <main class="timeline" aria-label="技能时间轴">
      <aside class="timeline-labels">
        <b>Timeline</b>
        <span>主要CD</span>
        <span>枪管预备</span>
        <span>Reassemble</span>
        <span>Double Check</span>
        <span>Checkmate</span>
        <span>Heat / Battery</span>
        <span>GCD</span>
        <span>能力技 1</span>
        <span>能力技 2</span>
        <span>能力技 3</span>
        <span>机器人</span>
        <span>机器人</span>
      </aside>
      <div id="grid" class="timeline-grid"></div>
    </main>

    <footer>
      时间轴从 -15s 开始，最长 20 分钟；能力技按 +0.6s、+1.2s、+1.8s 顺序显示，爆发药水30秒内的本体与机器人技能会高亮；战斗前倒计时 [-15s, 0s) 的GCD格也允许放置能力技。
    </footer>

    <script src="app.js"></script>
  </body>
</html>
